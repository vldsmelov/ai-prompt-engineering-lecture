<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6E7"/>
      <stop offset="1" stop-color="#F3E7D3"/>
    </linearGradient>
    <linearGradient id="core" x1="470" y1="320" x2="730" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EA6A2C"/>
      <stop offset="1" stop-color="#F39A55"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3A2D18" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="1160" height="860" rx="42" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="600" cy="450" r="130" fill="url(#core)"/>
    <circle cx="600" cy="450" r="228" stroke="#D7C2A3" stroke-width="3" stroke-dasharray="10 14"/>
    <circle cx="600" cy="450" r="330" stroke="#D7C2A3" stroke-width="2.5" stroke-dasharray="10 18"/>
  </g>
  <g font-family="Trebuchet MS, Segoe UI, sans-serif" fill="#16222C">
    <text x="600" y="430" font-size="36" font-weight="800" text-anchor="middle">Выбор ИИ</text>
    <text x="600" y="470" font-size="30" font-weight="700" text-anchor="middle">начинается с класса системы</text>
    <text x="600" y="515" font-size="22" font-weight="600" text-anchor="middle" fill="#FFF8F0">не с бренда и не с модного названия</text>
  </g>
  <g font-family="Trebuchet MS, Segoe UI, sans-serif">
    <g>
      <rect x="110" y="120" width="258" height="126" rx="28" fill="#FFF9EF" stroke="#D8C4A4" stroke-width="2"/>
      <text x="149" y="170" font-size="28" font-weight="800" fill="#16222C">ИИ-чаты</text>
      <text x="149" y="208" font-size="21" fill="#5D6972">Объясняют, пишут,</text>
      <text x="149" y="236" font-size="21" fill="#5D6972">суммируют, помогают думать</text>
    </g>
    <g>
      <rect x="832" y="122" width="258" height="126" rx="28" fill="#FFF9EF" stroke="#D8C4A4" stroke-width="2"/>
      <text x="871" y="170" font-size="28" font-weight="800" fill="#16222C">Search / Research</text>
      <text x="871" y="208" font-size="21" fill="#5D6972">Сначала ищут контекст,</text>
      <text x="871" y="236" font-size="21" fill="#5D6972">потом собирают ответ</text>
    </g>
    <g>
      <rect x="76" y="646" width="286" height="136" rx="28" fill="#FFF9EF" stroke="#D8C4A4" stroke-width="2"/>
      <text x="116" y="698" font-size="28" font-weight="800" fill="#16222C">Tool use / PAL</text>
      <text x="116" y="736" font-size="21" fill="#5D6972">Код, калькулятор, API,</text>
      <text x="116" y="764" font-size="21" fill="#5D6972">файлы, функции, коннекторы</text>
    </g>
    <g>
      <rect x="820" y="638" width="304" height="148" rx="28" fill="#FFF9EF" stroke="#D8C4A4" stroke-width="2"/>
      <text x="860" y="692" font-size="28" font-weight="800" fill="#16222C">Агенты</text>
      <text x="860" y="730" font-size="21" fill="#5D6972">Планируют, действуют,</text>
      <text x="860" y="758" font-size="21" fill="#5D6972">проверяют и собирают артефакт</text>
    </g>
    <g>
      <rect x="462" y="82" width="276" height="96" rx="28" fill="#EAF6F4" stroke="#8FBDBA" stroke-width="2"/>
      <text x="600" y="138" font-size="28" font-weight="800" fill="#0F7E7B" text-anchor="middle">Мультимодальность</text>
    </g>
    <g>
      <rect x="438" y="734" width="324" height="96" rx="28" fill="#FFF5E8" stroke="#E3BA8F" stroke-width="2"/>
      <text x="600" y="790" font-size="28" font-weight="800" fill="#C44F18" text-anchor="middle">Безопасность и данные</text>
    </g>
  </g>
</svg>
